version: '3.8'

services:
  video-processor:
    build: .
    container_name: xiaomi-video-processor
    restart: no  # 处理完退出，用cron或外部调度
    
    volumes:
      - ./merge:/app/video        # 小米摄像头原始视频目录
      - ./input:/input            # 合并后的MOV文件
      - ./output:/output          # 压缩后的MKV文件
      - ./logs:/logs              # 日志文件
      - ./state.db:/app/state.db  # 状态数据库
    
    environment:
      # 合并后删除源文件（建议开启，节省空间）
      # 注意：删除后无法恢复，确保合并成功后再开启
      - DELETE_AFTER_MERGE=true
      - MAX_MERGE=0
      - COMPRESS_CRF=32
      - COMPRESS_PRESET=medium
      - COMPRESS_THREADS=8
      - COMPRESS_RESOLUTION=1920x1080
      - DELETE_AFTER_COMPRESS=true
      - STATE_FILE=/app/state.db
      - SAVE_INTERVAL=5
      - VERIFY_VIDEO=true
      - MIN_OUTPUT_SIZE=1048576
    
    # 资源限制（与源项目 xiaomi-compress 保持一致）
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 4G
