version: '3.8'

services:
  webdav-uploader:
    build: .
    container_name: webdav-uploader
    restart: unless-stopped
    
    volumes:
      - ./upload:/upload          # 待上传文件目录
      - ./logs:/logs              # 日志文件
      - ./config.yaml:/app/config.yaml:ro  # 配置文件
      - ./state.db:/app/state.db  # SQLite 状态数据库
    
    environment:
      - PYTHONUNBUFFERED=1
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; os.stat('/app/uploader.py')"]
      interval: 60s
      timeout: 10s
      retries: 3
